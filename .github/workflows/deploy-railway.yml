name: 🚀 Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🔔 Trigger Railway Deploy
        run: |
          echo "🚀 Triggering Railway deployment..."
          HTTP=$(curl -s -o res.json -w "%{http_code}" \
            -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}")
          echo "HTTP: $HTTP"
          cat res.json
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "202" ]; then
            echo "❌ Deploy hook failed with status $HTTP"
            exit 1
          fi
          echo "✅ Deploy triggered!"

      - name: ⏳ Wait for build to finish
        run: |
          echo "Waiting 8 minutes for Railway to build and deploy..."
          sleep 480

      - name: 🌱 Seed iDigital positions (if needed)
        run: |
          echo "Checking if iDigital endpoint is live..."
          HTTP=$(curl -s -o seed.json -w "%{http_code}" \
            -X POST "https://twenty2crm-production-7997.up.railway.app/api/positions/add-idigital-june2026" \
            -H "Content-Type: application/json" \
            -d '{"key":"twenty2idigital2026"}')
          echo "Seed HTTP: $HTTP"
          cat seed.json
